# TEST 03 – extraSources
# Appends a fully custom source entry after the standard chart+ref sources.
# Verifies: extraSources item is included and the standard sources are still there.
projectName: test-cluster
repoURL: https://github.com/example/repo.git
targetRevision: main
destinationServer: https://kubernetes.default.svc
environment: test

apps:
  loki:
    enabled: true
    namespace: monitoring
    project: default
    syncWave: 10
    chart:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 6.53.0
      name: loki
    extraSources:
      - repoURL: https://github.com/example/loki-extras.git
        targetRevision: main
        path: "overlays/test-cluster"
    syncOptions:
      - CreateNamespace=true
